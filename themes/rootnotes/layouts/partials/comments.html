{{- $g := .Site.Params.giscus }}
{{- if and $g $g.repo_id }}
<section class="comments-section">
  <h2>Reacties</h2>
  <script src="https://giscus.app/client.js"
    data-repo="{{ $g.repo }}"
    data-repo-id="{{ $g.repo_id }}"
    data-category="{{ $g.category }}"
    data-category-id="{{ $g.category_id }}"
    data-mapping="pathname"
    data-strict="1"
    data-reactions-enabled="1"
    data-emit-metadata="1"
    data-input-position="bottom"
    data-theme="preferred_color_scheme"
    data-lang="nl"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
  </script>
</section>
{{- else }}
<section class="comments-section">
  <h2>Reacties</h2>
  <p class="comments-placeholder">
    Reacties zijn nog niet geconfigureerd. Vul <code>repo_id</code> en <code>category_id</code>
    in <code>hugo.toml</code> in via <a href="https://giscus.app" target="_blank" rel="noopener noreferrer">giscus.app</a>.
  </p>
</section>
{{- end }}
