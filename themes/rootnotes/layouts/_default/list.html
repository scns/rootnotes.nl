{{ define "main" }}
<div class="container">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div>{{ . }}</div>{{ end }}
  </header>

  {{ if .Pages }}
  <div class="posts-grid">
    {{ range .Pages }}
    {{ partial "post-card.html" . }}
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
  {{ else }}
  <div class="empty-state">
    <p>Nog geen artikelen geplaatst.</p>
  </div>
  {{ end }}
</div>
{{ end }}
