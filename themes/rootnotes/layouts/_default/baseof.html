<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "nl" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{- $title := cond .IsHome .Site.Title (printf "%s | %s" .Title .Site.Title) }}
  <title>{{ $title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  {{- with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
  {{- end }}
  <link rel="icon" href="{{ "images/logo.png" | relURL }}" type="image/png">
  {{- if .IsPage }}
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Summary }}{{ . | plainify | truncate 160 }}{{ else }}{{ $.Site.Params.description }}{{ end }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta name="twitter:card" content="summary">
  {{- end }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  {{- partial "header.html" . }}
  <main>
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . }}
</body>
</html>
