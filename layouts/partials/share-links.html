<div class="share-links" aria-label="Deel dit artikel" style="margin-top:1.25rem;padding:10px 0;border-top:1px solid rgba(255,255,255,0.04);">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <strong style="margin-right:8px">Deel:</strong>
    <a class="share-link share-link--x" href="https://x.com/intent/tweet?text={{ urlquery .Title }}&amp;url={{ .Permalink | urlquery }}" target="_blank" rel="noopener noreferrer">X</a>
    <a class="share-link share-link--linkedin" href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    <a class="share-link share-link--facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink | urlquery }}" target="_blank" rel="noopener noreferrer">Facebook</a>
    <a class="share-link share-link--email" href="mailto:?subject={{ urlquery .Title }}&amp;body={{ .Permalink | urlquery }}">E-mail</a>
    <button type="button" class="share-link share-link--copy" data-url="{{ .Permalink }}">Kopieer link</button>
  </div>

  <style>
    .share-link{background:transparent;border:1px solid rgba(255,255,255,0.06);color:inherit;padding:6px 10px;border-radius:4px;text-decoration:none;font-size:0.95rem}
    .share-link:hover{background:rgba(255,255,255,0.03)}
    .share-link--copy{cursor:pointer}
  </style>

  <script>
    (function(){
      if (window.__shareLinksInit) return; window.__shareLinksInit = true;
      document.addEventListener('click', function(e){
        var btn = e.target.closest && e.target.closest('.share-link--copy');
        if (!btn) return;
        var url = btn.getAttribute('data-url');
        if (!url) return;
        if (navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(url).then(function(){ btn.textContent = 'Gekopieerd!'; setTimeout(function(){ btn.textContent = 'Kopieer link'; },1500); }).catch(function(){ alert('Kopiëren mislukt — kopieer handmatig.'); });
        } else {
          try{ var ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); btn.textContent = 'Gekopieerd!'; setTimeout(function(){ btn.textContent = 'Kopieer link'; },1500);
          }catch(err){ alert('Kopiëren mislukt — kopieer handmatig.'); }
        }
      });
    })();
  </script>
</div>
